bind r source-file ~/.tmux.conf \; display-message "Config reloaded!"

##### DEFAULT SHELL #####
set-option -g default-command "${SHELL} -l"

##### MOUSE + VI MODE #####
set -g mouse on
setw -g mode-keys vi

##### PANE NAVIGATION #####
bind-key -n C-o next-window
bind-key -n C-i resize-pane -Z

bind-key -n C-[ if-shell '[ "$(tmux display -p "#{pane_width}")" -lt "$((`tmux display -p "#{window_width}"` / 2))" ]' \
    'resize-pane -x 50%' \
    'resize-pane -x 30%'


bind-key -n C-] if-shell '[ "$(tmux display -p "#{pane_height}")" -lt "$((`tmux display -p "#{window_height}"` / 2))" ]' \
    'resize-pane -y 50%' \
    'resize-pane -y 10%'

# bind-key -n C-] 'resize-pane -y 15%'

bind -n C-h select-pane -L
bind -n C-j select-pane -D
bind -n C-k select-pane -U
bind -n C-l select-pane -R

##### MISC #####
set -sg escape-time 0
set-option -g allow-rename on

bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi V send -X select-line
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"

bind -T copy-mode-vi / command-prompt "send -X search-forward '%%'"
bind -T copy-mode-vi ? command-prompt "send -X search-backward '%%'"
bind -T copy-mode-vi n send -X search-again
bind -T copy-mode-vi N send -X search-reverse
